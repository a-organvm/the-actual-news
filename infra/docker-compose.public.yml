services:
  public-web:
    build:
      context: ..
      dockerfile: apps/public-web/Dockerfile
    env_file:
      - ../.env.public.example
    environment:
      PORT: 3000
      NEXT_PUBLIC_ENABLE_VERIFIER_WORKSPACE: "false"
    ports:
      - "${PUBLIC_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
