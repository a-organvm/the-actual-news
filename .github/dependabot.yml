version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/public-web"
      - "/services/claim"
      - "/services/evidence"
      - "/services/gateway"
      - "/services/story"
      - "/services/verify"
      - "/tools/conformance"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-deps:
        patterns: ["*"]
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/apps/public-web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      docker-deps:
        patterns: ["*"]
